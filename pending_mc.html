<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meter Installation Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --bg-main: #f8fafc;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-border: rgba(226, 232, 240, 0.8);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Roboto', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .container-fluid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header Styling */
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      padding: 12px 0;
      margin-bottom: 16px;
      position: relative;
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .dashboard-header h2 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.025em;
    }

    #updateDate {
      font-size: 13px;
      opacity: 0.8;
      margin: 4px 0 0;
      font-weight: 400;
    }

    /* Main Container */
    .main-container {
      position: relative;
      z-index: 10;
    }

    /* Glass Effect Utility */
    .glass-panel {
      background: var(--surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }

    /* Filter Bar */
    .filter-container {
      padding: 16px;
      margin-bottom: 24px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-select, .form-control {
      font-size: 14px;
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      padding: 10px 12px;
      background-color: white;
      transition: all 0.2s ease;
      color: var(--text-primary);
    }

    .form-select:focus, .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      outline: none;
    }

    /* Horizontal Filter Grid */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 992px) {
      .filter-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 991px) {
      .search-filter-wrapper {
        grid-column: span 2;
      }
    }

    /* Stats Cards */
    .stats-card {
      border-radius: var(--radius-md);
      padding: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }

    .stats-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stats-card.total-card {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
    }
    .stats-card.month-card {
      background: white;
      border-color: var(--surface-border);
      color: var(--text-primary);
    }
    .stats-card.delayed-card {
      background: #fef2f2;
      border-color: #fee2e2;
      color: #991b1b;
    }

    .stats-card.active-kpi {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15), var(--shadow-lg);
      transform: translateY(-4px);
      z-index: 2;
    }

    .stats-card.active-kpi::before {
      content: 'ACTIVE';
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 10px;
      font-weight: 800;
      background: var(--primary);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 3;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      opacity: 0.9;
    }

    .card-value {
      font-size: 32px;
      font-weight: 800;
      margin: 8px 0 4px;
      line-height: 1;
    }

    .card-trend {
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-icon-bg {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 80px;
      opacity: 0.05;
      transform: rotate(-10deg);
    }

    /* Drill-Through Section */
    .drilldown-container {
      margin-top: 24px;
    }

    .breadcrumb-nav {
      background: white;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      border: 1px solid var(--surface-border);
      box-shadow: var(--shadow-sm);
    }

    .breadcrumb-item {
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .breadcrumb-item:hover {
      color: var(--primary);
    }

    .breadcrumb-item.active {
      color: var(--text-primary);
      font-weight: 700;
      cursor: default;
    }

    .breadcrumb-sep {
      color: #cbd5e1;
      font-size: 10px;
    }

    .drill-table-container {
      background: white;
      border: 1px solid var(--surface-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .drill-table {
      width: 100%;
      border-collapse: collapse;
    }

    .drill-table th {
      background: #f8fafc;
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e2e8f0;
    }

    .drill-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
      transition: background 0.2s;
    }

    .drill-table tr:last-child td {
      border-bottom: none;
    }

    .drill-table .drill-row {
      cursor: pointer;
    }

    .drill-table .drill-row:hover td {
      background-color: #f1f5f9;
    }

    .drill-table .drill-row td:first-child {
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drill-table .drill-row .drill-icon {
      font-size: 18px;
      opacity: 0.6;
    }

    .drill-table .count-badge {
      background: #f1f5f9;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    /* Connection List View */
    .appl-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
      background: #f8fafc;
    }

    .appl-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      transition: all 0.2s;
      border-left: 4px solid var(--primary);
    }

    .appl-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .appl-no {
      font-weight: 700;
      color: var(--primary);
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .appl-date {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Connection Detail Table (Last Level) */
    .detail-table-wrapper {
      padding: 0;
      overflow-x: auto;
      background: #f8fafc;
    }

    .detail-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .detail-table th {
      background: #f1f5f9;
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .detail-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      color: var(--text-primary);
    }

    .detail-table tr:hover {
      background-color: #f1f5f9;
    }

    .detail-table .detail-row {
      cursor: pointer;
    }

    /* Info Grid for Modal */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 10px 0;
    }

    .info-item {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-content.glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      border-radius: 16px;
    }

    .badge-class {
      background: #e0e7ff;
      color: #3730a3;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .badge-phase {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .badge-agency {
      background: #d1fae5;
      color: #065f46;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .appl-no-cell {
      font-weight: 700;
      color: var(--primary);
    }

    .customer-name {
      font-weight: 600;
      color: #1e293b;
    }

    /* Summary Section */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 40px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-primary);
    }

    /* Tabbed Navigation */
    .nav-tabs-custom {
      border-bottom: 2px solid var(--surface-border);
      gap: 12px;
      margin-bottom: 20px;
    }

    .nav-tabs-custom .nav-link {
      border: none;
      color: var(--text-secondary);
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s;
      position: relative;
    }

    .nav-tabs-custom .nav-link:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    .nav-tabs-custom .nav-link.active {
      color: var(--primary);
      background: transparent;
    }

    .nav-tabs-custom .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
    }

    .tab-content-custom {
      background: transparent;
    }

    /* Modal Sticky Header */
    .modal-content.glass-panel {
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 1070;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-border) !important;
    }

    .modal-body {
      overflow-y: auto;
      flex-grow: 1;
    }

    /* Download Button Styles */
    .btn-download {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      color: var(--text-secondary);
      border: 1px solid var(--surface-border);
      transition: all 0.2s;
    }

    .btn-download:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      cursor: pointer;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 992px) {
      .summary-grid {
        grid-template-columns: 1.5fr 1fr;
      }
    }

    .chart-container {
      padding: 20px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Custom Table for Class Summary */
    .custom-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .custom-table th {
      background: #f1f5f9;
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      border-bottom: 2px solid #e2e8f0;
    }

    .custom-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .custom-table tr:last-child td {
      border-bottom: none;
    }

    .custom-table tr:hover td {
      background-color: #f8fafc;
    }

    /* Loader */
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
    }

    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 768px) {
      .dashboard-header h2 { font-size: 16px; }
      .stats-card {
        padding: 10px !important;
        min-height: 90px !important;
      }
      .card-value { font-size: 20px !important; margin: 4px 0 2px !important; }
      .card-title { font-size: 10px !important; }
      .card-trend { font-size: 10px !important; }
      .card-icon-bg { font-size: 50px !important; }
      .filter-container { padding: 8px !important; margin-bottom: 12px !important; }
      .filter-grid { gap: 6px !important; }
      .form-select, .form-control { padding: 6px 8px !important; font-size: 12px !important; }
    }

  </style>
</head>

<body>
  <div class="dashboard-header">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <div class="text-start">
        <h2 class="mb-0 fs-5"><i class='bx bx-tachometer me-2'></i>Pending MCs</h2>
        <p id="updateDate" class="mb-0 mt-1 opacity-75" style="font-size: 0.75rem;">As on: Initializing data hub...</p>
      </div>
      <div>
        <button id="officePrefBtn" class="btn btn-outline-light btn-sm d-flex align-items-center gap-1" style="font-size: 0.72rem; padding: 4px 8px;">
          <i class='bx bx-cog'></i> Prefs
        </button>
      </div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="main-container">
      <!-- Filter Bar -->
      <div class="filter-container glass-panel p-3 mb-3">
        <div class="filter-grid">
          <div>
            <select id="regionFilter" class="form-select"></select>
          </div>
          <div>
            <select id="divisionFilter" class="form-select"></select>
          </div>
          <div>
            <select id="cccFilter" class="form-select"></select>
          </div>
          <div>
            <select id="classFilter" class="form-select"></select>
          </div>
          <div class="search-filter-wrapper">
            <input type="text" id="searchInput" class="form-control" placeholder="Search Appl No / Name...">
          </div>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loadingIndicator" class="loader-wrapper">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-secondary fw-medium">Fetching latest records...</p>
      </div>

      <!-- Dashboard Content -->
      <div id="dashboardContent" style="display: none;">
        <!-- Stats Cards -->
        <div class="row g-4" id="cardsContainer"></div>

        <!-- Breakdown Section -->
        <div id="breakdownSection" class="drilldown-container" style="display: none;">
          <div class="section-title">
            <i class='bx bx-list-ul'></i>
            <span id="breakdownTitle">Region-wise Breakdown</span>
          </div>
          
          <div class="breadcrumb-nav" id="drillBreadcrumbs">
            <!-- Breadcrumbs will be injected here -->
          </div>

          <div class="drill-table-container">
            <div id="drilldownContent"></div>
          </div>
        </div>

        <!-- Multi-Board Tabbed Summaries -->
        <div class="mt-5">
          <div class="section-title mb-4">
            <i class='bx bx-data'></i>
            <span>Analytical Summaries</span>
          </div>

          <ul class="nav nav-tabs nav-tabs-custom" id="summaryTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="class-tab" data-bs-toggle="tab" data-bs-target="#class-pane" type="button" role="tab">
                <i class='bx bx-list-check me-2'></i>Class-wise
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="region-tab" data-bs-toggle="tab" data-bs-target="#region-pane" type="button" role="tab">
                <i class='bx bx-map-alt me-2'></i>Region-wise
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="division-tab" data-bs-toggle="tab" data-bs-target="#division-pane" type="button" role="tab">
                <i class='bx bx-git-branch me-2'></i>Division-wise
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="ccc-tab" data-bs-toggle="tab" data-bs-target="#ccc-pane" type="button" role="tab">
                <i class='bx bx-map-alt me-2'></i>CCC-wise
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="consumer-tab" data-bs-toggle="tab" data-bs-target="#consumer-pane" type="button" role="tab">
                <i class='bx bx-user me-2'></i>Consumer-wise
              </button>
            </li>
          </ul>

          <div class="tab-content tab-content-custom" id="summaryTabsContent">
            <div class="tab-pane fade" id="class-pane" role="tabpanel">
              <div class="glass-panel overflow-hidden" id="classTable" style="min-height: 400px;"></div>
            </div>
            <div class="tab-pane fade" id="region-pane" role="tabpanel">
              <div class="glass-panel overflow-hidden" id="regionTable" style="min-height: 400px;"></div>
            </div>
            <div class="tab-pane fade show active" id="division-pane" role="tabpanel">
              <div class="glass-panel overflow-hidden" id="divisionTable" style="min-height: 400px;"></div>
            </div>
            <div class="tab-pane fade" id="ccc-pane" role="tabpanel">
              <div class="glass-panel overflow-hidden" id="cccTable" style="min-height: 400px;"></div>
            </div>
            <div class="tab-pane fade" id="consumer-pane" role="tabpanel">
              <div class="glass-panel overflow-hidden" id="consumerTable" style="min-height: 400px;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-spacing"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="mzo_data_hub.js"></script>
  <script src="mzo_presets_hub.js"></script>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmOUW4jxUtEGWhPHaoNBsvpBcGzhHJZRUx_9mxFBp91sfg4yD8WIqIK_xv0vlFs2yP-Ljz09JW1U2c/pub?gid=0&single=true&output=csv";
    const BREAKDOWN_LEVELS = ['Region', 'Division', 'CCC', 'APPL_NO'];
    
    let rawData = [];
    const filters = { region: '', division: '', ccc: '', search: '', classSearch: '', kpiFilter: 'Total' };
    
    // Drill-through state
    let drillState = {
      level: 0,
      path: [],
      data: [],
      currentTitle: 'Region-wise Breakdown'
    };

    // Utility functions
    const parseDate = d => {
      if (!d || typeof d !== 'string') return null;
      const parts = d.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})(?:\s+.*)?$/);
      if (parts) {
        const [, day, month, year] = parts;
        return new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
      }
      const parsed = new Date(d);
      return isNaN(parsed) ? null : parsed;
    };

    const formatDateShort = d => {
      const date = parseDate(d);
      if (!date) return d || 'N/A';
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = String(date.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    };

    const getDaysDifference = (date1, date2) => Math.round((date1 - date2) / (24 * 60 * 60 * 1000));

    // Filter Functions
    function loadFilters() {
      const regionSet = new Set();
      const divisionSet = new Set();
      const cccSet = new Set();
      const classSet = new Set();

      rawData.forEach(row => {
        if (row.Region) regionSet.add(row.Region);
        if (row.CLASS) classSet.add(row.CLASS);
        if (!filters.region || row.Region === filters.region) {
          if (row.Division) divisionSet.add(row.Division);
        }
        if ((!filters.division || row.Division === filters.division) &&
          (!filters.region || row.Region === filters.region)) {
          if (row.CCC) cccSet.add(row.CCC);
        }
      });

      populateSelect('regionFilter', Array.from(regionSet).sort(), filters.region);
      populateSelect('divisionFilter', Array.from(divisionSet).sort(), filters.division);
      populateSelect('cccFilter', Array.from(cccSet).sort(), filters.ccc);
      populateSelect('classFilter', Array.from(classSet).sort(), filters.classSearch);
    }

    function populateSelect(id, items, selectedValue) {
      const select = document.getElementById(id);
      const labelMap = {
        'regionFilter': 'All Regions',
        'divisionFilter': 'All Divisions',
        'cccFilter': 'All CCCs',
        'classFilter': 'All Classes'
      };
      const placeholder = labelMap[id] || 'All';
      select.innerHTML = `<option value="">${placeholder}</option>` +
        items.map(i => `<option value="${i}" ${selectedValue === i ? 'selected' : ''}>${i}</option>`).join('');
    }

    function getFilteredData(withKpi = true) {
      return rawData.filter(row => {
        const matchRegion = !filters.region || row.Region === filters.region;
        const matchDivision = !filters.division || row.Division === filters.division;
        const matchCCC = !filters.ccc || row.CCC === filters.ccc;
        
        const matchSearch = !filters.search || 
          String(row.APPL_NO).toLowerCase().includes(filters.search.toLowerCase()) ||
          String(row.FNAME).toLowerCase().includes(filters.search.toLowerCase()) ||
          String(row.LNAME).toLowerCase().includes(filters.search.toLowerCase());

        const matchClass = !filters.classSearch || 
          String(row.CLASS) === filters.classSearch;

        if (!withKpi) return matchRegion && matchDivision && matchCCC && matchSearch && matchClass;

        // KPI Segment Filtering
        let matchKPI = true;
        if (filters.kpiFilter === 'Industrial') {
          matchKPI = String(row.CLASS).toUpperCase() === 'I';
        } else if (filters.kpiFilter === 'WithinMonth') {
          const r = parseDate(row['Report Date']);
          const i = parseDate(row['Meter Installation Date']);
          matchKPI = r && i && getDaysDifference(r, i) <= 30;
        } else if (filters.kpiFilter === 'Delayed') {
          const r = parseDate(row['Report Date']);
          const i = parseDate(row['Meter Installation Date']);
          matchKPI = r && i && getDaysDifference(r, i) >= 90;
        }
        
        return matchRegion && matchDivision && matchCCC && matchSearch && matchClass && matchKPI;
      });
    }

    function toggleKpiFilter(type) {
      filters.kpiFilter = (filters.kpiFilter === type) ? 'Total' : type;
      updateDashboard();
    }

    // Dashboard Rendering
    function updateDashboard() {
      // KPI cards update based on Region/Div/CCC/Search, but NOT the KPI filter itself
      const baseData = getFilteredData(false);
      renderStats(baseData);
      
      // Summaries update based on all filters INCLUDING the active KPI
      const finalData = getFilteredData(true);
      renderAllSummaries(finalData);
    }

    function renderStats(data) {
      const total = data.length;
      const withinMonth = data.filter(row => {
        const r = parseDate(row['Report Date']);
        const i = parseDate(row['Meter Installation Date']);
        return r && i && getDaysDifference(r, i) <= 30;
      }).length;

      const delayed = data.filter(row => {
        const r = parseDate(row['Report Date']);
        const i = parseDate(row['Meter Installation Date']);
        return r && i && getDaysDifference(r, i) >= 90;
      }).length;

      const industrial = data.filter(row => String(row.CLASS).toUpperCase() === 'I').length;

      const cards = [
        { label: 'Total Pending', val: total, id: 'Total', icon: 'bx-layer', trend: 'All in Zone', color: 'total-card' },
        { label: 'Ind', val: industrial, id: 'Industrial', icon: 'bx-factory', trend: 'Pending Master Card', color: 'delayed-card', style: 'background: #eff6ff; border-color: #dbeafe; color: #1e40af;' },
        { label: 'Within Mo', val: withinMonth, id: 'WithinMonth', icon: 'bx-calendar-check', trend: `${((withinMonth/total)*100 || 0).toFixed(1)}% Case`, color: 'month-card' },
        { label: 'Delayed', val: delayed, id: 'Delayed', icon: 'bx-error-alt', trend: `${((delayed/total)*100 || 0).toFixed(1)}% critical`, color: 'delayed-card' }
      ];

      document.getElementById('cardsContainer').innerHTML = cards.map(c => `
        <div class="col-6 col-lg-3">
          <div class="stats-card glass-panel ${c.color} ${filters.kpiFilter === c.id ? 'active-kpi' : ''}" style="${c.style || ''}" onclick="toggleKpiFilter('${c.id}')">
            <i class='bx ${c.icon} card-icon-bg'></i>
            <div>
              <p class="card-title">${c.label}</p>
              <h3 class="card-value">${c.val.toLocaleString()}</h3>
            </div>
            <div class="card-trend">
              <i class='bx ${c.id === 'Delayed' ? 'bx-trending-up' : 'bx-info-circle'}'></i>
              <span>${c.trend}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Filter-driven summaries logic remains, but inline drilldown is disabled for summaries
    function initDrillBreakdown(title, customData = null, type = 'Total') {
      const data = customData || filterData();
      let filtered = data;
      
      if (type === 'WithinMonth') {
        filtered = data.filter(row => {
          const r = parseDate(row['Report Date']);
          const i = parseDate(row['Meter Installation Date']);
          return r && i && getDaysDifference(r, i) <= 30;
        });
      } else if (type === 'Delayed') {
        filtered = data.filter(row => {
          const r = parseDate(row['Report Date']);
          const i = parseDate(row['Meter Installation Date']);
          return r && i && getDaysDifference(r, i) >= 90;
        });
      } else if (type === 'Industrial') {
        filtered = data.filter(row => String(row.CLASS).toUpperCase().startsWith('I'));
      }

      // For search results, we can still use the modal instead of inline
      showConsumerListModal(title, filtered);
    }

    function renderConsumerTableHTML(currentData) {
      return `
        <div class="detail-table-wrapper">
          <table class="detail-table">
            <thead>
              <tr>
                <th>APPL_NO</th>
                <th>Customer Name</th>
                <th>Division</th>
                <th>CCC</th>
                <th>Load</th>
                <th>Class</th>
                <th>Phase</th>
                <th>Agency</th>
                <th>Installation Date</th>
              </tr>
            </thead>
            <tbody>
              ${currentData.map(row => {
                const name = [row.FNAME, row.LNAME].filter(Boolean).join(' ');
                return `
                  <tr class="detail-row" onclick="showConsumerModal('${row.APPL_NO}')">
                    <td class="appl-no-cell">${row.APPL_NO || 'N/A'}</td>
                    <td class="customer-name">${name || 'Private Customer'}</td>
                    <td class="small fw-medium">${row.Division || 'N/A'}</td>
                    <td class="small fw-medium">${row.CCC || 'N/A'}</td>
                    <td>${row.LOAD || 'N/A'}</td>
                    <td><span class="badge-class">${row.CLASS || 'N/A'}</span></td>
                    <td><span class="badge-phase">${row.PHASE || 'N/A'}</span></td>
                    <td><span class="badge-agency">${row.WO_ASSIGNEE_TYPE || 'Individual'}</span></td>
                    <td class="text-secondary">${formatDateShort(row['Meter Installation Date'])}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDrillView() {
      // This function is now legacy/unused as per user request to move to modals
      // But keeping logic for potential future use or search fallback
    }

    function drillIn(val) {
      if (drillState.level < BREAKDOWN_LEVELS.length - 1) {
        drillState.path.push(val);
        drillState.level++;
        renderDrillView();
      }
    }

    function drillOut(toLevel) {
      drillState.path = drillState.path.slice(0, toLevel);
      drillState.level = toLevel;
      renderDrillView();
    }

    function updateDrillBreadcrumbs() {
      const container = document.getElementById('drillBreadcrumbs');
      let html = `<div class="breadcrumb-item ${drillState.level === 0 ? 'active' : ''}" onclick="drillOut(0)">Overview</div>`;
      
      drillState.path.forEach((p, i) => {
        html += `
          <i class='bx bx-chevron-right breadcrumb-sep'></i>
          <div class="breadcrumb-item ${i + 1 === drillState.level ? 'active' : ''}" onclick="drillOut(${i + 1})">${p}</div>
        `;
      });
      container.innerHTML = html;
    }

    function renderAllSummaries(data) {
      renderSummaryTable(data, 'classTable', 'CLASS', 'Consumer Class');
      renderSummaryTable(data, 'regionTable', 'Region', 'Region');
      renderSummaryTable(data, 'divisionTable', 'Division', 'Division');
      renderSummaryTable(data, 'cccTable', 'CCC', 'CCC');

      // Consumer-wise Tab (Earliest Installation First)
      const sortedByDate = [...data].sort((a, b) => {
        const d1 = parseDate(a['Meter Installation Date']) || new Date(8640000000000000);
        const d2 = parseDate(b['Meter Installation Date']) || new Date(8640000000000000);
        return d1 - d2;
      });

      const container = document.getElementById('consumerTable');
      container.innerHTML = `
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
          <span class="fw-bold small text-secondary">CHRONOLOGICAL CONSUMER LIST</span>
          <button class="btn-download" onclick="downloadCSV(window.currentConsumerData, 'consumer_wise_pending.csv')">
            <i class='bx bx-download'></i> CSV
          </button>
        </div>
        ${renderConsumerTableHTML(sortedByDate)}
      `;
      window.currentConsumerData = sortedByDate;
    }

    function renderSummaryTable(data, containerId, key, label) {
      const summary = {};
      data.forEach(row => {
        const val = row[key] || 'Unknown';
        summary[val] = (summary[val] || 0) + 1;
      });

      const sorted = Object.entries(summary).sort((a, b) => b[1] - a[1]);
      const total = data.length || 1;

      // Summary Table Header with Download
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
          <span class="fw-bold small text-secondary">${label.toUpperCase()}</span>
          <button class="btn-download" onclick="exportSummary('${label}')">
            <i class='bx bx-download'></i> CSV
          </button>
        </div>
        <table class="custom-table">
          <thead>
            <tr><th>${label}</th><th>Count</th><th>%</th></tr>
          </thead>
          <tbody>
            ${sorted.map(([val, count]) => `
              <tr class="drill-row" onclick="showConsumerListModal('${label}: ${val.replace(/'/g, "\\'")}', rawData.filter(r => r['${key}'] === '${val.replace(/'/g, "\\'")}'))">
                <td><span class="fw-bold" style="font-size: 13px;">${val}</span></td>
                <td>${count.toLocaleString()}</td>
                <td><span class="text-secondary small">${(count/total*100).toFixed(1)}%</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // CSV Export Utilities
    function downloadCSV(data, filename) {
      if (!data || data.length === 0) return;
      const headers = Object.keys(data[0]).join(',');
      const rows = data.map(row => 
        Object.values(row).map(val => `"${String(val).replace(/"/g, '""')}"`).join(',')
      );
      const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows.join("\n");
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function exportSummary(label) {
      // Find the summary data currently displayed
      const table = Array.from(document.querySelectorAll('.section-title')).find(t => t.innerText.includes(label)) 
                  ? document.getElementById(label.toLowerCase() + 'Table') 
                  : document.querySelector('.tab-pane.active .custom-table');
      
      const rows = Array.from(table.querySelectorAll('tbody tr')).map(tr => {
        const td = tr.querySelectorAll('td');
        return { Category: td[0].innerText, Count: td[1].innerText, Share: td[2].innerText };
      });
      downloadCSV(rows, `pending_mc_${label.toLowerCase()}_summary.csv`);
    }

    function exportFullList() {
      const title = document.getElementById('listModalTitle').textContent.split(': ')[1] || 'Export';
      // Use the global lastFilteredListData (need to track it)
      downloadCSV(lastFilteredListData, `pending_mc_${title.toLowerCase()}_list.csv`);
    }

    // Handlers
    function handleResults(data) {
      rawData = data.filter(d => d.Region);
      
      const reportDates = rawData.map(row => parseDate(row['Report Date'])).filter(d => d instanceof Date && !isNaN(d));
      if (reportDates.length > 0) {
        const maxDate = new Date(Math.max(...reportDates));
        document.getElementById('updateDate').textContent = `As on: ${maxDate.toLocaleDateString('en-GB')}`;
      }

      document.getElementById('loadingIndicator').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';

      loadFilters();

      // Setup preference button listener
      const prefBtn = document.getElementById('officePrefBtn');
      if (prefBtn) {
        prefBtn.addEventListener('click', () => {
          if (window.mzoPresetsHub) {
            const cccList = [];
            const seen = new Set();
            rawData.forEach(d => {
              const cccName = d.CCC;
              if (cccName && !seen.has(cccName)) {
                seen.add(cccName);
                cccList.push({
                  code: cccName,
                  name: cccName,
                  region: d.Region,
                  division: d.Division
                });
              }
            });
            window.mzoPresetsHub.showSetupModal({
              showCCC: true,
              cccList: cccList
            }, () => {
              window.mzoPresetsHub.applyToPage();
              filters.region = document.getElementById('regionFilter').value;
              filters.division = document.getElementById('divisionFilter').value;
              filters.ccc = document.getElementById('cccFilter').value;
              loadFilters();
              updateDashboard();
            });
          }
        });
      }

      // Apply office preferences on load
      if (window.mzoPresetsHub) {
        window.mzoPresetsHub.applyToPage();
        filters.region = document.getElementById('regionFilter').value;
        filters.division = document.getElementById('divisionFilter').value;
        filters.ccc = document.getElementById('cccFilter').value;
        loadFilters();
      }

      updateDashboard();
    }

    // Event Listeners
    ['regionFilter', 'divisionFilter', 'cccFilter'].forEach(id => {
      document.getElementById(id).addEventListener('change', (e) => {
        const key = id.replace('Filter', '');
        filters[key] = e.target.value;
        if (key === 'region') { filters.division = ''; filters.ccc = ''; }
        if (key === 'division') { filters.ccc = ''; }
        loadFilters();
        updateDashboard();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      filters.search = e.target.value;
      updateDashboard();
    });

    document.getElementById('classFilter').addEventListener('change', (e) => {
      filters.classSearch = e.target.value;
      updateDashboard();
    });

    // Init
    async function init() {
      try {
        let cachedData;
        if (typeof mzoDataHub !== 'undefined') cachedData = await mzoDataHub.get('CACHE_PENDING_MC');

        if (cachedData) {
          const results = Papa.parse(cachedData, { header: true, skipEmptyLines: true, dynamicTyping: true });
          handleResults(results.data);
        } else {
          Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true, dynamicTyping: true,
            complete: (r) => handleResults(r.data),
            error: (e) => console.error(e)
          });
        }
      } catch (e) {
        console.error(e);
      }
    }

    function showConsumerModal(applNo) {
      // Find the consumer in the full dataset
      const consumer = rawData.find(r => String(r.APPL_NO) === String(applNo));
      if (!consumer) return;

      const name = [consumer.FNAME, consumer.LNAME].filter(Boolean).join(' ');
      const fields = [
        { label: 'Application No', key: 'APPL_NO', val: consumer.APPL_NO },
        { label: 'Full Name', key: 'NAME', val: name || 'N/A' },
        { label: 'Consumer Class', key: 'CLASS', val: consumer.CLASS },
        { label: 'Phase', key: 'PHASE', val: consumer.PHASE },
        { label: 'Connected Load', key: 'LOAD', val: consumer.LOAD },
        { label: 'WO Assignee (Agency)', key: 'AGENCY', val: consumer.WO_ASSIGNEE_TYPE || 'Individual' },
        { label: 'Installation Date', key: 'INST_DATE', val: formatDateShort(consumer['Meter Installation Date']) },
        { label: 'Report Date', key: 'REP_DATE', val: formatDateShort(consumer['Report Date']) },
        { label: 'Region', key: 'REG', val: consumer.Region },
        { label: 'Division', key: 'DIV', val: consumer.Division },
        { label: 'CCC', key: 'CCC_VAL', val: consumer.CCC }
      ];

      document.getElementById('modalTitle').textContent = `Details: ${consumer.APPL_NO}`;
      document.getElementById('modalContent').innerHTML = `
        <div class="info-grid">
          ${fields.map(f => `
            <div class="info-item">
              <span class="info-label">${f.label}</span>
              <span class="info-value">${f.val || 'N/A'}</span>
            </div>
          `).join('')}
        </div>
      `;

      // Set global data for copy function
      window.lastViewedConsumer = fields;

      // Show Consumer Modal (Level 2)
      const modal = new bootstrap.Modal(document.getElementById('consumerModal'));
      modal.show();
    }

    async function copyConsumerToWhatsApp() {
      if (!window.lastViewedConsumer) return;
      
      const header = `*PENDING MASTER CARD DETAILS*\n----------------------------\n`;
      const body = window.lastViewedConsumer.map(f => `*${f.label}:* ${f.val || 'N/A'}`).join('\n');
      const footer = `\n----------------------------\n_Generated via MZO App_`;
      
      const text = header + body + footer;

      try {
        await navigator.clipboard.writeText(text);
        
        const btn = document.getElementById('copyBtn');
        const icon = btn.querySelector('i');
        const originalHtml = btn.innerHTML;
        
        btn.classList.replace('btn-outline-primary', 'btn-success');
        btn.innerHTML = `<i class='bx bx-check'></i>`;
        
        setTimeout(() => {
          btn.classList.replace('btn-success', 'btn-outline-primary');
          btn.innerHTML = originalHtml;
        }, 1500);
      } catch (err) {
        console.error('Failed to copy: ', err);
        alert('Failed to copy to clipboard.');
      }
    }

    let lastFilteredListData = [];

    function showConsumerListModal(title, data) {
      lastFilteredListData = data;
      document.getElementById('listModalTitle').textContent = title;
      document.getElementById('listModalContent').innerHTML = renderConsumerTableHTML(data);
      
      // Show List Modal (Level 1)
      const modal = new bootstrap.Modal(document.getElementById('listModal'));
      modal.show();
    }

    window.toggleKpiFilter = toggleKpiFilter;
    window.showConsumerModal = showConsumerModal;
    window.showConsumerListModal = showConsumerListModal;
    window.exportSummary = exportSummary;
    window.exportFullList = exportFullList;
    window.copyConsumerToWhatsApp = copyConsumerToWhatsApp;
    init();
  </script>

  <!-- Level 1: Consumer List Modal -->
  <div class="modal fade" id="listModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content glass-panel" style="max-height: 90vh;">
        <div class="modal-header border-0 pb-3 d-flex justify-content-between align-items-center">
          <h5 class="modal-title fw-bold" id="listModalTitle">Segment Analysis</h5>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="exportFullList()">
              <i class='bx bx-download me-1'></i> CSV
            </button>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
        </div>
        <div class="modal-body overflow-auto p-0" id="listModalContent">
          <!-- Table injected here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Level 2: Consumer Detail Modal -->
  <div class="modal fade" id="consumerModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content glass-panel">
        <div class="modal-header border-0 pb-0 d-flex justify-content-between align-items-center">
          <h5 class="modal-title fw-bold" id="modalTitle">Consumer Details</h5>
          <div class="d-flex gap-2 pe-3">
             <button id="copyBtn" class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="copyConsumerToWhatsApp()" title="Copy for WhatsApp">
              <i class='bx bx-copy'></i><i class='bx bxl-whatsapp ms-1'></i>
            </button>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
        </div>
        <div class="modal-body pt-4" id="modalContent">
          <!-- Details injected here -->
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Backdrop for nested modals -->
  <style>
    .modal-backdrop + .modal-backdrop { z-index: 1055; }
    #consumerModal { z-index: 1060; }
  </style>
</body>
</html>
