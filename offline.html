<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline - MZO Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #131b2e; /* Matches app background */
      color: #9ca3af;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 40px 30px;
      border-radius: 28px;
      background: #131b2e;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 9px 9px 16px #0b101b, -9px -9px 16px #1b2641; /* Neumorphic dark */
      animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(244, 63, 94, 0.1); /* Subtle red accent */
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: #f43f5e;
      font-size: 32px;
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2), inset -2px -2px 5px rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #9ca3af;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 14px;
      border: none;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
    }

    .btn i {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <i class="fa-solid fa-cloud-showers-water"></i>
    </div>
    <h1>You are Offline</h1>
    <p>This report view isn't cached yet. Please connect to the internet to load this page, or click below to return to the main dashboard.</p>
    <a href="index.html" class="btn">
      <i class="fa-solid fa-house"></i>
      Return to Dashboard
    </a>
  </div>
</body>
</html>
