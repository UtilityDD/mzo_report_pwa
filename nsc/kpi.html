<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPI Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <script src="../mzo_presets_hub.js"></script>
</head>
<body>
  <header class="header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
      <div style="text-align: left;">
        <h1 style="font-size: 1.5rem; margin: 0;"><i class="fas fa-chart-bar"></i> NSC KPIs</h1>
        <p class="subtitle" style="margin: 3px 0 0 0; font-size: 0.8rem;">Updated: <span id="todayDateSubtitle"></span></p>
      </div>
      <div>
        <button id="officePrefBtn" class="btn-small" style="font-size: 0.8rem; padding: 6px 12px; display: flex; align-items: center; gap: 6px; border-radius: 8px;">
          <i class="fas fa-cog"></i> Prefs
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">

      <!-- Breakdown Modal -->
      <div class="modal" id="breakdownModal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="breakdownModalTitle">Office Breakdown</h3>
            <span class="close" onclick="closeBreakdownModal()">&times;</span>
          </div>
          <div class="modal-body">
            <!-- Tab Navigation -->
            <div class="tab-nav">
              <button class="tab-link active" onclick="openTab(event, 'RegionTab')">Region</button>
              <button class="tab-link" onclick="openTab(event, 'DivisionTab')">Division</button>
              <button class="tab-link" onclick="openTab(event, 'CCCTab')">CCC</button>
            </div>

            <!-- Tab Content -->
            <div id="RegionTab" class="tab-content" style="display: block;">
              <div class="kpi-table-wrapper">
                <table class="kpi-table" id="modalRegionTable">
                  <!-- Header and body will be populated by JS -->
                </table>
              </div>
            </div>

            <div id="DivisionTab" class="tab-content">
              <div class="kpi-table-wrapper">
                <table class="kpi-table" id="modalDivisionTable">
                  <!-- Header and body will be populated by JS -->
                </table>
              </div>
            </div>

            <div id="CCCTab" class="tab-content">
              <div class="kpi-table-wrapper">
                <table class="kpi-table" id="modalCCCTable">
                  <!-- Header and body will be populated by JS -->
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="control-panel kpi-filter-panel">
        <div class="checkbox-group" id="classCheckboxes">
          <!-- Checkboxes will be dynamically inserted here -->
        </div>
      </div>

      <div class="average-delay-cards" id="averageDelayCards">
        <!-- Average delay cards will be dynamically inserted here -->
      </div>

      <hr style="margin: 20px 0;" />

      <h4 style="margin-bottom: 10px;">KPI Summary</h4>

      <div class="kpi-table-wrapper">
        <!-- Region-wise Table -->
        <div class="kpi-block">
          <h5>Region-wise</h5>
          <table id="kpiRegionTable" class="kpi-table">
            <thead>
              <tr>
                <th data-sort="name">Region <span class="sort-icon"></span></th>
                <th data-sort="Qtn">Qtn Delay <span class="sort-icon"></span></th>
                <th data-sort="WO">WO Delay <span class="sort-icon"></span></th>
                <th data-sort="Conn">Conn Delay <span class="sort-icon"></span></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="kpi-block">
          <h5>Division-wise</h5>
          <table id="kpiDivisionTable" class="kpi-table">
            <thead>
              <tr>
                <th data-sort="name">Division <span class="sort-icon"></span></th>
                <th data-sort="Qtn">Qtn Delay <span class="sort-icon"></span></th>
                <th data-sort="WO">WO Delay <span class="sort-icon"></span></th>
                <th data-sort="Conn">Conn Delay <span class="sort-icon"></span></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="kpi-block">
          <h5>CCC-wise</h5>
          <table id="kpiCCCTable" class="kpi-table">
            <thead>
              <tr>
                <th data-sort="name">CCC <span class="sort-icon"></span></th>
                <th data-sort="Qtn">Qtn Delay <span class="sort-icon"></span></th>
                <th data-sort="WO">WO Delay <span class="sort-icon"></span></th>
                <th data-sort="Conn">Conn Delay <span class="sort-icon"></span></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="kpi.js"></script>
</body>
</html>
