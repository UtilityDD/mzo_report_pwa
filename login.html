<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MZO Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      color: #94a3b8;
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 28px;
      animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: all 0.25s ease;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 10px rgba(79, 70, 229, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .pin-toggle {
      position: absolute;
      right: 14px;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .pin-toggle:hover {
      color: #f8fafc;
    }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
    }

    .login-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
    }

    .login-btn.loading {
      pointer-events: none;
      background: #475569;
      box-shadow: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .login-btn.loading .spinner {
      display: block;
    }

    .login-btn.loading span {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h2>MZO Portal</h2>
    </div>

    <form class="login-form" id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="User ID" required autocomplete="username" />
      </div>

      <div class="input-group">
        <div class="input-wrapper">
          <input type="password" id="pin" placeholder="PIN" required autocomplete="current-password" />
          <i class="fas fa-eye pin-toggle" id="pinToggle"></i>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="login-btn" id="loginSubmit">
        <span>Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const pinToggle = document.getElementById('pinToggle');
    const errorMsg = document.getElementById('errorMsg');
    const loginSubmit = document.getElementById('loginSubmit');

    // Toggle PIN visibility
    pinToggle.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type = isPassword ? 'text' : 'password';
      pinToggle.className = isPassword ? 'fas fa-eye-slash pin-toggle' : 'fas fa-eye pin-toggle';
    });

    // Handle Form Submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const pin = pinInput.value.trim();
      
      errorMsg.textContent = '';
      loginSubmit.classList.add('loading');
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, pin })
        });
        
        const data = await response.json();
        
        if (response.ok && data.status === 'success') {
          // Store authentication states for PWA offline usability
          localStorage.setItem('mzo_authenticated', 'true');
          localStorage.setItem('mzo_user_profile', JSON.stringify(data.profile));
          
          // Redirect to index page
          window.location.href = '/index.html';
        } else {
          errorMsg.textContent = data.message || 'Invalid credentials. Please try again.';
          loginSubmit.classList.remove('loading');
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = 'Server connection failed. Please try again later.';
        loginSubmit.classList.remove('loading');
      }
    });

    // Check if already authenticated on load
    if (localStorage.getItem('mzo_authenticated') === 'true') {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
