<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MZO Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
    :root {
      /* Dark Theme 3D Neumorphic variables */
      --bg-body: #1e293b;
      --card-bg: linear-gradient(145deg, #202b3e, #1b2535);
      --card-border: rgba(255, 255, 255, 0.03);
      --text-title: #f8fafc;
      --text-desc: #94a3b8;
      --input-bg: #151f30;
      --input-border: rgba(0, 0, 0, 0.15);
      --input-text: #f8fafc;
      --input-focus-border: #4f46e5;
      
      --shadow-dark: rgba(0, 0, 0, 0.3);
      --shadow-light: rgba(255, 255, 255, 0.03);
      --neu-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
      --neu-inset: inset 3px 3px 6px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(255,255,255,0.02);
      
      --btn-bg: linear-gradient(145deg, #5850ec, #4338ca);
      --btn-shadow: 4px 4px 8px rgba(0, 0, 0, 0.25), -4px -4px 8px rgba(255, 255, 255, 0.05);
      --btn-active-shadow: inset 3px 3px 6px rgba(0,0,0,0.3);
    }

    body.light-theme {
      /* Light Theme 3D Neumorphic variables */
      --bg-body: #e2e8f0;
      --card-bg: linear-gradient(145deg, #f1f5f9, #cbd5e1);
      --card-border: rgba(255, 255, 255, 0.5);
      --text-title: #0f172a;
      --text-desc: #475569;
      --input-bg: #f1f5f9;
      --input-border: rgba(0, 0, 0, 0.05);
      --input-text: #0f172a;
      --input-focus-border: #4f46e5;
      
      --shadow-dark: rgba(148, 163, 184, 0.7);
      --shadow-light: rgba(255, 255, 255, 0.95);
      --neu-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
      --neu-inset: inset 3px 3px 6px rgba(148, 163, 184, 0.5), inset -3px -3px 6px rgba(255, 255, 255, 0.9);
      
      --btn-bg: linear-gradient(145deg, #5850ec, #4338ca);
      --btn-shadow: 4px 4px 8px rgba(79, 70, 229, 0.2), -4px -4px 8px rgba(255, 255, 255, 0.5);
      --btn-active-shadow: inset 3px 3px 6px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      color: var(--text-desc);
      transition: background 0.3s, color 0.3s;
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: var(--neu-shadow);
      display: flex;
      flex-direction: column;
      gap: 28px;
      animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-title);
      letter-spacing: -0.02em;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--input-text);
      font-size: 14px;
      outline: none;
      box-shadow: var(--neu-inset);
      transition: all 0.25s ease;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--input-focus-border);
      box-shadow: var(--neu-inset);
    }

    .remember-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 8px;
      user-select: none;
    }

    .remember-group label {
      font-size: 13px;
      color: var(--text-desc);
      cursor: pointer;
    }

    .remember-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      background: var(--input-bg);
      box-shadow: var(--neu-inset);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      outline: none;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .remember-group input[type="checkbox"]:checked {
      background: #4f46e5;
      border-color: #4f46e5;
      box-shadow: none;
    }

    .remember-group input[type="checkbox"]:checked::before {
      content: '\f00c';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      color: #fff;
      font-size: 11px;
    }

    .pin-toggle {
      position: absolute;
      right: 14px;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .pin-toggle:hover {
      color: var(--text-title);
    }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
    }

    .login-btn {
      width: 100%;
      background: var(--btn-bg);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: var(--btn-shadow);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--btn-shadow);
      filter: brightness(1.1);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: var(--btn-active-shadow);
    }

    .login-btn.loading {
      pointer-events: none;
      background: #475569;
      box-shadow: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .login-btn.loading .spinner {
      display: block;
    }

    .login-btn.loading span {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header" style="position: relative; display: flex; justify-content: center; align-items: center;">
      <h2>MZO Portal</h2>
      <button type="button" id="themeToggleBtn" style="position: absolute; right: 0; background: none; border: none; color: var(--text-desc); cursor: pointer; font-size: 16px; outline: none; transition: color 0.2s;">
        <i class="fas fa-sun" id="themeIcon"></i>
      </button>
    </div>

    <form class="login-form" id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="User ID" required autocomplete="username" />
      </div>

      <div class="input-group">
        <div class="input-wrapper">
          <input type="password" id="pin" placeholder="PIN" required autocomplete="current-password" />
          <i class="fas fa-eye pin-toggle" id="pinToggle"></i>
        </div>
      </div>

      <div class="remember-group">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember my credentials</label>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="login-btn" id="loginSubmit">
        <span>Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const pinToggle = document.getElementById('pinToggle');
    const errorMsg = document.getElementById('errorMsg');
    const loginSubmit = document.getElementById('loginSubmit');
    const rememberMeCheckbox = document.getElementById('rememberMe');

    // Toggle PIN visibility
    pinToggle.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type = isPassword ? 'text' : 'password';
      pinToggle.className = isPassword ? 'fas fa-eye-slash pin-toggle' : 'fas fa-eye pin-toggle';
    });

    // Load saved credentials on load
    const savedUsername = localStorage.getItem('mzo_saved_username');
    const savedPin = localStorage.getItem('mzo_saved_pin');
    if (savedUsername && savedPin) {
      usernameInput.value = savedUsername;
      pinInput.value = savedPin;
      rememberMeCheckbox.checked = true;
    }

    // Handle Form Submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const pin = pinInput.value.trim();
      
      errorMsg.textContent = '';
      loginSubmit.classList.add('loading');
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'same-origin',
          body: JSON.stringify({ username, pin })
        });
        
        const data = await response.json();
        
        if (response.ok && data.status === 'success') {
          // Store authentication states for PWA offline usability
          localStorage.setItem('mzo_authenticated', 'true');
          localStorage.setItem('mzo_user_profile', JSON.stringify(data.profile));
          
          // Save credentials if checked, otherwise clear them
          if (rememberMeCheckbox.checked) {
            localStorage.setItem('mzo_saved_username', username);
            localStorage.setItem('mzo_saved_pin', pin);
          } else {
            localStorage.removeItem('mzo_saved_username');
            localStorage.removeItem('mzo_saved_pin');
          }
          
          // Redirect to index page
          window.location.href = '/index.html';
        } else {
          errorMsg.textContent = data.message || 'Invalid credentials. Please try again.';
          loginSubmit.classList.remove('loading');
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = 'Server connection failed. Please try again later.';
        loginSubmit.classList.remove('loading');
      }
    });

    // Check if already authenticated on load
    if (localStorage.getItem('mzo_authenticated') === 'true') {
      window.location.href = '/index.html';
    }

    // Theme toggler click handler
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    
    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        themeIcon.className = 'fas fa-moon';
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('light-theme');
        themeIcon.className = 'fas fa-sun';
        localStorage.setItem('theme', 'dark');
      }
    }
    
    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = localStorage.getItem('theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
    });
    
    // Apply saved theme on initial load
    applyTheme(localStorage.getItem('theme') || 'dark');
  </script>
</body>
</html>
