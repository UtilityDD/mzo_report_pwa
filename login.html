<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MZO Portal Login</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MZO Reports" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Dark Theme 3D Neumorphic variables */
      --bg-body: #1e293b;
      --card-bg: linear-gradient(145deg, #202b3e, #1b2535);
      --card-border: rgba(255, 255, 255, 0.03);
      --text-title: #f8fafc;
      --text-desc: #94a3b8;
      --input-bg: #151f30;
      --input-border: rgba(0, 0, 0, 0.15);
      --input-text: #f8fafc;
      --input-focus-border: #4f46e5;
      
      --shadow-dark: rgba(0, 0, 0, 0.3);
      --shadow-light: rgba(255, 255, 255, 0.03);
      --neu-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
      --neu-inset: inset 3px 3px 6px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(255,255,255,0.02);
      
      --btn-bg: linear-gradient(145deg, #5850ec, #4338ca);
      --btn-shadow: 4px 4px 8px rgba(0, 0, 0, 0.25), -4px -4px 8px rgba(255, 255, 255, 0.05);
      --btn-active-shadow: inset 3px 3px 6px rgba(0,0,0,0.3);
    }

    body.light-theme {
      /* Light Theme 3D Neumorphic variables */
      --bg-body: #e2e8f0;
      --card-bg: linear-gradient(145deg, #f1f5f9, #cbd5e1);
      --card-border: rgba(255, 255, 255, 0.5);
      --text-title: #0f172a;
      --text-desc: #475569;
      --input-bg: #f1f5f9;
      --input-border: rgba(0, 0, 0, 0.05);
      --input-text: #0f172a;
      --input-focus-border: #4f46e5;
      
      --shadow-dark: rgba(148, 163, 184, 0.7);
      --shadow-light: rgba(255, 255, 255, 0.95);
      --neu-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
      --neu-inset: inset 3px 3px 6px rgba(148, 163, 184, 0.5), inset -3px -3px 6px rgba(255, 255, 255, 0.9);
      
      --btn-bg: linear-gradient(145deg, #5850ec, #4338ca);
      --btn-shadow: 4px 4px 8px rgba(79, 70, 229, 0.2), -4px -4px 8px rgba(255, 255, 255, 0.5);
      --btn-active-shadow: inset 3px 3px 6px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      color: var(--text-desc);
      transition: background 0.3s, color 0.3s;
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: var(--neu-shadow);
      display: flex;
      flex-direction: column;
      gap: 28px;
      animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-title);
      letter-spacing: -0.02em;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--input-text);
      font-size: 14px;
      outline: none;
      box-shadow: var(--neu-inset);
      transition: all 0.25s ease;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--input-focus-border);
      box-shadow: var(--neu-inset);
    }

    .remember-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 8px;
      user-select: none;
    }

    .remember-group label {
      font-size: 13px;
      color: var(--text-desc);
      cursor: pointer;
    }

    .remember-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      background: var(--input-bg);
      box-shadow: var(--neu-inset);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      outline: none;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .remember-group input[type="checkbox"]:checked {
      background: #4f46e5;
      border-color: #4f46e5;
      box-shadow: none;
    }

    .remember-group input[type="checkbox"]:checked::before {
      content: '\f00c';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      color: #fff;
      font-size: 11px;
    }

    .pin-toggle {
      position: absolute;
      right: 14px;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .pin-toggle:hover {
      color: var(--text-title);
    }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
    }

    .login-btn {
      width: 100%;
      background: var(--btn-bg);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: var(--btn-shadow);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--btn-shadow);
      filter: brightness(1.1);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: var(--btn-active-shadow);
    }

    .login-btn.loading {
      pointer-events: none;
      background: #475569;
      box-shadow: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .login-btn.loading .spinner {
      display: block;
    }

    .login-btn.loading span {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Full-screen auth transition overlay */
    #auth-transition {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(79, 70, 229, 0.22), transparent 55%),
        radial-gradient(ellipse 70% 50% at 20% 80%, rgba(14, 165, 233, 0.12), transparent 50%),
        #0f172a;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    body.light-theme #auth-transition {
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(79, 70, 229, 0.18), transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 20%, rgba(14, 165, 233, 0.1), transparent 50%),
        #e2e8f0;
    }

    #auth-transition.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    #auth-transition.success .auth-orb-core {
      background: linear-gradient(145deg, #22c55e, #16a34a);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.35), 0 12px 40px rgba(22, 163, 74, 0.35);
    }

    #auth-transition.success .auth-ring {
      border-color: rgba(34, 197, 94, 0.35);
      animation-duration: 2.2s;
    }

    .auth-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 24px;
      text-align: center;
      transform: translateY(12px) scale(0.96);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.45s ease;
    }

    #auth-transition.active .auth-stage {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .auth-orb {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(148, 163, 184, 0.25);
      border-top-color: #818cf8;
      border-right-color: rgba(56, 189, 248, 0.7);
      animation: authOrbit 1.15s linear infinite;
    }

    .auth-ring.r2 {
      inset: 12px;
      border-top-color: #38bdf8;
      border-right-color: rgba(129, 140, 248, 0.55);
      animation-duration: 1.65s;
      animation-direction: reverse;
    }

    .auth-ring.r3 {
      inset: 24px;
      border-top-color: #a5b4fc;
      border-right-color: transparent;
      animation-duration: 2.1s;
      opacity: 0.85;
    }

    .auth-orb-core {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(145deg, #6366f1, #4338ca);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 12px 32px rgba(67, 56, 202, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      animation: authPulse 1.8s ease-in-out infinite;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .auth-copy h3 {
      font-size: 18px;
      font-weight: 650;
      color: #f8fafc;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    body.light-theme .auth-copy h3 {
      color: #0f172a;
    }

    .auth-copy p {
      font-size: 13px;
      color: #94a3b8;
      min-height: 1.2em;
    }

    body.light-theme .auth-copy p {
      color: #64748b;
    }

    .auth-progress {
      width: min(220px, 70vw);
      height: 4px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.2);
      overflow: hidden;
    }

    .auth-progress-bar {
      height: 100%;
      width: 18%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6366f1, #38bdf8, #6366f1);
      background-size: 200% 100%;
      animation: authBarShine 1.4s linear infinite;
      transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #auth-transition.success .auth-progress-bar {
      width: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      animation: none;
    }

    .auth-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 3px;
      border-radius: 50%;
      background: #64748b;
      animation: authDot 1.2s ease-in-out infinite;
    }

    .auth-dots span:nth-child(2) { animation-delay: 0.15s; }
    .auth-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes authOrbit {
      to { transform: rotate(360deg); }
    }

    @keyframes authPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes authBarShine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes authDot {
      0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .auth-ring,
      .auth-orb-core,
      .auth-progress-bar,
      .auth-dots span {
        animation: none !important;
      }
    }

    /* Install app (available without login) */
    .login-install-btn {
      width: 100%;
      margin-top: 4px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(99, 102, 241, 0.45);
      background: rgba(99, 102, 241, 0.12);
      color: #c7d2fe;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
    }

    .login-install-btn:hover {
      background: rgba(99, 102, 241, 0.22);
      transform: translateY(-1px);
    }

    body.light-theme .login-install-btn {
      border-color: rgba(79, 70, 229, 0.35);
      background: rgba(79, 70, 229, 0.08);
      color: #4338ca;
    }

    .login-install-btn.hidden,
    .pwa-modal-overlay.hidden {
      display: none !important;
    }

    .pwa-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    @media (min-width: 640px) {
      .pwa-modal-overlay { align-items: center; }
    }

    .pwa-modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .pwa-modal {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 22px 20px 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      transform: translateY(24px) scale(0.98);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
      color: #94a3b8;
    }

    .pwa-modal-overlay.active .pwa-modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    body.light-theme .pwa-modal {
      background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
      color: #64748b;
    }

    .pwa-modal-top {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }

    .pwa-modal-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(145deg, #6366f1, #4338ca);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .pwa-modal-top h4 {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 700;
      color: #f8fafc;
    }

    body.light-theme .pwa-modal-top h4 { color: #0f172a; }

    .pwa-modal-top p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .pwa-modal-steps {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.08);
      font-size: 12.5px;
      line-height: 1.5;
    }

    .pwa-modal-steps ol {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .pwa-shortcut-warn {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.35);
      color: #fbbf24;
      font-size: 12px;
      line-height: 1.45;
    }

    body.light-theme .pwa-shortcut-warn {
      color: #b45309;
      background: rgba(245, 158, 11, 0.1);
    }

    .pwa-modal-actions {
      display: flex;
      gap: 8px;
    }

    .pwa-modal-actions button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-pwa-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-pwa-primary:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .btn-pwa-secondary {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.12) !important;
    }

    body.light-theme .btn-pwa-secondary {
      color: #475569;
      border-color: rgba(15, 23, 42, 0.12) !important;
    }
  </style>
</head>
<body>

  <div class="login-container" id="loginCard">
    <div class="login-header">
      <h2>MZO Portal</h2>
    </div>

    <form class="login-form" id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="User ID" required autocomplete="username" />
      </div>

      <div class="input-group">
        <div class="input-wrapper">
          <input type="password" id="pin" placeholder="PIN" required autocomplete="current-password" />
          <i class="fas fa-eye pin-toggle" id="pinToggle"></i>
        </div>
      </div>

      <div class="remember-group">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember my credentials</label>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="login-btn" id="loginSubmit">
        <span>Sign In</span>
        <div class="spinner"></div>
      </button>

      <button type="button" class="login-install-btn" id="loginInstallBtn" title="Install without signing in">
        <i class="fas fa-download"></i>
        <span id="loginInstallBtnLabel">Install app</span>
      </button>
    </form>
  </div>

  <div id="auth-transition" aria-live="polite" aria-busy="false" hidden>
    <div class="auth-stage">
      <div class="auth-orb" aria-hidden="true">
        <div class="auth-ring"></div>
        <div class="auth-ring r2"></div>
        <div class="auth-ring r3"></div>
        <div class="auth-orb-core" id="authOrbCore">MZO</div>
      </div>
      <div class="auth-copy">
        <h3 id="authTitle">Signing you in</h3>
        <p id="authSubtitle">Checking credentials</p>
        <div class="auth-dots" id="authDots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="auth-progress" aria-hidden="true">
        <div class="auth-progress-bar" id="authProgressBar"></div>
      </div>
    </div>
  </div>

  <div id="pwa-install-modal" class="pwa-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="pwa-install-title">
    <div class="pwa-modal">
      <div class="pwa-modal-top">
        <div class="pwa-modal-icon" aria-hidden="true"><i class="fas fa-mobile-screen-button"></i></div>
        <div>
          <h4 id="pwa-install-title">Install MZO App</h4>
          <p id="pwa-install-desc">Install directly from this page — no login required. Prefer <b>Install app</b>, not a browser shortcut.</p>
        </div>
      </div>
      <div id="pwa-install-steps" class="pwa-modal-steps">
        <strong id="pwa-steps-title">Recommended</strong>
        <ol id="pwa-steps-list"></ol>
        <p id="pwa-shortcut-warn" class="pwa-shortcut-warn" hidden></p>
      </div>
      <div class="pwa-modal-actions">
        <button type="button" id="pwa-dismiss-btn" class="btn-pwa-secondary">Not now</button>
        <button type="button" id="pwa-install-btn" class="btn-pwa-primary">Install app</button>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const pinToggle = document.getElementById('pinToggle');
    const errorMsg = document.getElementById('errorMsg');
    const loginSubmit = document.getElementById('loginSubmit');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const authTransition = document.getElementById('auth-transition');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authProgressBar = document.getElementById('authProgressBar');
    const authOrbCore = document.getElementById('authOrbCore');

    let authStageTimer = null;

    function setAuthProgress(pct) {
      if (authProgressBar) authProgressBar.style.width = pct + '%';
    }

    function setAuthCopy(title, subtitle) {
      if (authTitle) authTitle.textContent = title;
      if (authSubtitle) authSubtitle.textContent = subtitle || '';
    }

    function showAuthTransition() {
      if (!authTransition) return;
      clearAuthStageTimers();
      authTransition.hidden = false;
      authTransition.classList.remove('success');
      authTransition.setAttribute('aria-busy', 'true');
      if (authOrbCore) authOrbCore.textContent = 'MZO';
      setAuthCopy('Signing you in', 'Checking credentials');
      setAuthProgress(22);
      requestAnimationFrame(() => authTransition.classList.add('active'));

      const stages = [
        { at: 450, title: 'Signing you in', subtitle: 'Verifying User ID & PIN', pct: 42 },
        { at: 1100, title: 'Almost there', subtitle: 'Creating secure session', pct: 68 },
        { at: 1900, title: 'Preparing portal', subtitle: 'Loading your workspace', pct: 86 }
      ];
      stages.forEach(stage => {
        const t = setTimeout(() => {
          if (!authTransition.classList.contains('active') || authTransition.classList.contains('success')) return;
          setAuthCopy(stage.title, stage.subtitle);
          setAuthProgress(stage.pct);
        }, stage.at);
        authStageTimer.push(t);
      });
    }

    function clearAuthStageTimers() {
      if (Array.isArray(authStageTimer)) {
        authStageTimer.forEach(clearTimeout);
      }
      authStageTimer = [];
    }

    function hideAuthTransition() {
      if (!authTransition) return;
      clearAuthStageTimers();
      authTransition.classList.remove('active', 'success');
      authTransition.setAttribute('aria-busy', 'false');
      setTimeout(() => {
        if (!authTransition.classList.contains('active')) {
          authTransition.hidden = true;
          setAuthProgress(18);
        }
      }, 360);
    }

    function completeAuthTransition(profileName) {
      clearAuthStageTimers();
      if (!authTransition) return;
      authTransition.classList.add('success');
      if (authOrbCore) authOrbCore.innerHTML = '<i class="fas fa-check"></i>';
      const greet = profileName ? `Welcome, ${profileName}` : 'Welcome back';
      setAuthCopy(greet, 'Opening MZO Portal…');
      setAuthProgress(100);
    }

    // Toggle PIN visibility
    pinToggle.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type = isPassword ? 'text' : 'password';
      pinToggle.className = isPassword ? 'fas fa-eye-slash pin-toggle' : 'fas fa-eye pin-toggle';
    });

    // Load saved credentials on load
    const savedUsername = localStorage.getItem('mzo_saved_username');
    const savedPin = localStorage.getItem('mzo_saved_pin');
    if (savedUsername && savedPin) {
      usernameInput.value = savedUsername;
      pinInput.value = savedPin;
      rememberMeCheckbox.checked = true;
    }

    // Handle Form Submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const pin = pinInput.value.trim();
      
      errorMsg.textContent = '';
      loginSubmit.classList.add('loading');
      showAuthTransition();
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'same-origin',
          body: JSON.stringify({ username, pin })
        });
        
        const data = await response.json();
        
        if (response.ok && data.status === 'success') {
          // Store authentication states for PWA offline usability
          localStorage.setItem('mzo_authenticated', 'true');
          localStorage.setItem('mzo_user_profile', JSON.stringify(data.profile));
          
          // Save credentials if checked, otherwise clear them
          if (rememberMeCheckbox.checked) {
            localStorage.setItem('mzo_saved_username', username);
            localStorage.setItem('mzo_saved_pin', pin);
          } else {
            localStorage.removeItem('mzo_saved_username');
            localStorage.removeItem('mzo_saved_pin');
          }

          const displayName = (data.profile && (data.profile.Name || data.profile.Username)) || '';
          completeAuthTransition(displayName);

          // Brief success beat, then open portal (overlay stays until navigation)
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 720);
        } else {
          hideAuthTransition();
          errorMsg.textContent = data.message || 'Invalid credentials. Please try again.';
          loginSubmit.classList.remove('loading');
        }
      } catch (err) {
        console.error('Login error:', err);
        hideAuthTransition();
        errorMsg.textContent = 'Server connection failed. Please try again later.';
        loginSubmit.classList.remove('loading');
      }
    });

    // Check if already authenticated on load
    if (localStorage.getItem('mzo_authenticated') === 'true') {
      showAuthTransition();
      setAuthCopy('Welcome back', 'Restoring your session');
      setAuthProgress(55);
      window.location.href = '/index.html';
    }

    // Apply saved theme on initial load
    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-theme');
      } else {
        document.body.classList.remove('light-theme');
      }
    }
    applyTheme(localStorage.getItem('theme') || 'dark');

    // --- PWA install: direct Install app (no login required, never "Got it") ---
    (function initPwaInstallOnLogin() {
      let deferredPrompt = null;
      let promptWaiters = [];
      const modal = document.getElementById('pwa-install-modal');
      const installBtn = document.getElementById('pwa-install-btn');
      const dismissBtn = document.getElementById('pwa-dismiss-btn');
      const cardInstallBtn = document.getElementById('loginInstallBtn');
      const cardInstallLabel = document.getElementById('loginInstallBtnLabel');
      const stepsList = document.getElementById('pwa-steps-list');
      const stepsTitle = document.getElementById('pwa-steps-title');
      const descEl = document.getElementById('pwa-install-desc');
      const shortcutWarn = document.getElementById('pwa-shortcut-warn');

      function isStandaloneApp() {
        return window.matchMedia('(display-mode: standalone)').matches
          || window.matchMedia('(display-mode: fullscreen)').matches
          || window.navigator.standalone === true;
      }

      function isIos() {
        return /iphone|ipad|ipod/i.test(navigator.userAgent)
          || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      }

      function setWarn(msg) {
        if (!shortcutWarn) return;
        if (msg) {
          shortcutWarn.hidden = false;
          shortcutWarn.innerHTML = msg;
        } else {
          shortcutWarn.hidden = true;
          shortcutWarn.textContent = '';
        }
      }

      function setInstallLabels(text, busy) {
        const label = text || 'Install app';
        if (installBtn) {
          installBtn.textContent = label;
          installBtn.disabled = !!busy;
        }
        if (cardInstallLabel) cardInstallLabel.textContent = label;
        if (cardInstallBtn) cardInstallBtn.disabled = !!busy;
      }

      function showReadyModal() {
        if (!modal || isStandaloneApp()) return;
        if (descEl) {
          descEl.innerHTML = 'Tap <b>Install app</b> to install MZO now — no login needed. You can sign in after.';
        }
        if (stepsTitle) stepsTitle.textContent = 'One-tap install';
        if (stepsList) {
          stepsList.innerHTML = '<li>This installs the <b>real app</b> (full screen), not a browser shortcut.</li>';
        }
        setWarn('');
        setInstallLabels('Install app', false);
        modal.classList.remove('hidden');
        requestAnimationFrame(() => modal.classList.add('active'));
      }

      function hideModal() {
        if (!modal) return;
        modal.classList.remove('active');
        setTimeout(() => {
          if (!modal.classList.contains('active')) modal.classList.add('hidden');
        }, 300);
      }

      function storePrompt(e) {
        if (e && e.preventDefault) e.preventDefault();
        deferredPrompt = e;
        promptWaiters.splice(0).forEach(fn => fn(e));
        setInstallLabels('Install app', false);
        showReadyModal();
      }

      function waitForPrompt(ms) {
        if (deferredPrompt) return Promise.resolve(deferredPrompt);
        return new Promise(resolve => {
          const timer = setTimeout(() => {
            const idx = promptWaiters.indexOf(handler);
            if (idx >= 0) promptWaiters.splice(idx, 1);
            resolve(null);
          }, ms);
          function handler(ev) {
            clearTimeout(timer);
            resolve(ev || deferredPrompt);
          }
          promptWaiters.push(handler);
        });
      }

      async function triggerDirectInstall() {
        setInstallLabels('Installing…', true);
        setWarn('');

        // Ensure service worker is ready (required for Chrome install prompt)
        if ('serviceWorker' in navigator) {
          try {
            await navigator.serviceWorker.register('/sw.js');
            await navigator.serviceWorker.ready;
          } catch (err) {
            console.warn('SW ready failed:', err);
          }
        }

        let promptEvent = deferredPrompt || await waitForPrompt(6000);

        if (promptEvent) {
          try {
            await promptEvent.prompt();
            await promptEvent.userChoice;
          } catch (err) {
            console.warn('Install prompt failed:', err);
            setWarn('Install was blocked. Try again, or use Chrome menu → <b>Install app</b>.');
            setInstallLabels('Install app', false);
            return false;
          }
          deferredPrompt = null;
          hideModal();
          if (cardInstallBtn) cardInstallBtn.classList.add('hidden');
          setInstallLabels('Install app', false);
          return true;
        }

        // No native install API (common on iOS / some browsers)
        setInstallLabels('Install app', false);
        if (isIos()) {
          setWarn('iPhone/iPad cannot one-tap install from the web. In <b>Safari</b>: Share → <b>Add to Home Screen</b>.');
          if (!modal.classList.contains('active')) {
            if (descEl) descEl.textContent = 'iOS needs Safari Add to Home Screen (Apple does not allow a direct Install button).';
            if (stepsTitle) stepsTitle.textContent = 'Safari only';
            if (stepsList) {
              stepsList.innerHTML = '<li>Share → <b>Add to Home Screen</b></li><li>Then open MZO from the Home Screen</li>';
            }
            modal.classList.remove('hidden');
            requestAnimationFrame(() => modal.classList.add('active'));
          }
        } else {
          setWarn('Install prompt not ready yet. Use <b>Chrome</b> / <b>Edge</b>, stay on this page, then tap <b>Install app</b> again. Do not use “Add to Home screen” (that is only a shortcut).');
          if (!modal.classList.contains('active')) {
            if (descEl) descEl.innerHTML = 'Tap <b>Install app</b> again in a moment for the direct install dialog.';
            if (stepsTitle) stepsTitle.textContent = 'Direct install';
            if (stepsList) {
              stepsList.innerHTML = '<li>Use Chrome or Edge on Android/desktop</li><li>Tap <b>Install app</b> — never “Add shortcut”</li>';
            }
            modal.classList.remove('hidden');
            requestAnimationFrame(() => modal.classList.add('active'));
          }
        }
        return false;
      }

      // Capture install capability as early as possible
      window.addEventListener('beforeinstallprompt', storePrompt);

      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        hideModal();
        if (cardInstallBtn) cardInstallBtn.classList.add('hidden');
      });

      installBtn?.addEventListener('click', (e) => {
        e.preventDefault();
        triggerDirectInstall();
      });

      cardInstallBtn?.addEventListener('click', (e) => {
        e.preventDefault();
        triggerDirectInstall();
      });

      dismissBtn?.addEventListener('click', hideModal);
      modal?.addEventListener('click', (e) => {
        if (e.target === modal) hideModal();
      });

      if (isStandaloneApp()) {
        if (cardInstallBtn) cardInstallBtn.classList.add('hidden');
        return;
      }

      if (localStorage.getItem('mzo_authenticated') === 'true') return;

      setInstallLabels('Install app', false);

      // Register SW immediately, then open modal once install is available
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(() => navigator.serviceWorker.ready)
          .catch(() => {});
      }

      // If prompt already available, show modal with working Install app button
      if (deferredPrompt) {
        showReadyModal();
      } else {
        // Wait briefly for Chrome to expose install; then show modal with Install app
        waitForPrompt(4500).then(ev => {
          if (ev) showReadyModal();
          else if (!isIos()) {
            // Still show modal with Install app that will retry/wait on click
            if (descEl) descEl.innerHTML = 'Tap <b>Install app</b> to start the direct install. No login required.';
            if (stepsTitle) stepsTitle.textContent = 'Direct install';
            if (stepsList) {
              stepsList.innerHTML = '<li>Tap the blue <b>Install app</b> button</li><li>Confirm in the browser dialog</li>';
            }
            setWarn('If nothing happens, open this site in <b>Chrome</b> (not a shortcut browser).');
            setInstallLabels('Install app', false);
            modal.classList.remove('hidden');
            requestAnimationFrame(() => modal.classList.add('active'));
          }
        });
      }
    })();
  </script>
</body>
